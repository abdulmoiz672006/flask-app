name: Flask CI/CD

on:
  push:
    branches:
      - main

 jobs:
     build-and-push:
         runs-on: Devops_for_kub
         
      steps:
         - name: Checkout repository
           uses: actions/checkout@v4

          - name: Login to Docker
            uses: docker/login-action@v3
            with:
              username: ${{secrets.DOCKER_USERNAME}}
              password: ${{secrets.DOCKER_PASSWORD}}

           - name: Build-and -push-to-docker
             uses: docker/build-push-actions
             with:
                context: .
                push: true
                tags: moiz672006/flask-app:latest
  deploy:
     needs: build-and-push
     runs-on: Devops_for_kub
     steps:
        - name: Deploy to EC2
          uses: appleboy/ssh-action
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USERNAME }}
            key: ${{ secrets.EC2_SSH_KEY1 }}
            script:
              cd home/ubuntu
              if[ ! -d "flask-app"]; then
                 git clone https://github.com/abdulmoiz672006/flask-app.git
               fi

              cd flask-app
              git pull origin main

              docker pull moiz672006/flaskapp:latest
              docker-compose down
              docker-compose up -d
              
            
                
              
